<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Adaptation Journey</title>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        :root { --pixel-border: #333; --bg: #eef2f3; }
        body { font-family: 'NeoDunggeunmo', monospace; background-color: var(--bg); padding: 20px; margin: 0; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; background: white; border: 4px solid var(--pixel-border); padding: 20px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
        
        /* 다국어 선택기 스크롤 스타일 */
        .lang-wrapper { text-align: right; margin-bottom: 15px; }
        #lang-select { 
            font-family: inherit; padding: 5px; border: 3px solid var(--pixel-border); 
            max-height: 200px; cursor: pointer; background: #fff;
        }

        /* 픽셀 디자인 요소 */
        .avatar-box { font-size: 2.5rem; display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .emoji-opt { cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .emoji-opt.selected { filter: grayscale(0); transform: scale(1.3); }
        input, select, textarea { width: 90%; font-family: inherit; border: 3px solid var(--pixel-border); padding: 10px; margin: 10px 0; }
        button { font-family: inherit; border: 3px solid var(--pixel-border); padding: 12px 24px; cursor: pointer; background: #9b59b6; color: white; box-shadow: 4px 4px 0 var(--pixel-border); }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--pixel-border); }

        /* 징검다리 디자인 */
        .stepping-stones { display: flex; justify-content: space-around; margin: 30px 0; position: relative; }
        .stepping-stones::after { content: ''; position: absolute; top: 20px; left: 10%; right: 10%; height: 6px; background: #ddd; z-index: 1; }
        .stone { z-index: 2; width: 70px; height: 45px; background: #8d6e63; border: 3px solid var(--pixel-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 0.8rem; box-shadow: 0 5px 0 #5d4037; }
        .stone.active { background: #2ecc71; transform: translateY(-5px); box-shadow: 0 5px 0 #27ae60; }

        /* 말풍선 */
        .speech-bubble { background: #f9f9f9; border: 3px solid var(--pixel-border); padding: 20px; border-radius: 15px; margin-top: 15px; position: relative; }
        .speech-bubble::after { content: ''; position: absolute; top: -13px; left: 50%; transform: translateX(-50%); border-width: 0 12px 12px 12px; border-style: solid; border-color: transparent transparent var(--pixel-border) transparent; }

        .post-card { border: 4px solid var(--pixel-border); padding: 20px; margin-top: 25px; background: #fff; position: relative; text-align: left; }
        .eraser-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; border: none; background: none; font-size: 1.5rem; }
        .hidden { display: none !important; }
        #admin-panel { margin-top: 40px; border-top: 3px dashed #bbb; padding-top: 20px; }
        .chip { display: inline-block; padding: 6px 12px; border: 2px solid #333; background: #eee; margin: 5px; }
    </style>
</head>
<body>
    <div class="lang-wrapper">
        <select id="lang-select">
            <!-- 주요 언어 상단 배치 후 나머지는 알파벳순 -->
            <option value="ko">한국어 (Korean)</option>
            <option value="en">English</option>
            <option value="ja">日本語 (Japanese)</option>
            <option value="zh">中文 (Chinese)</option>
            <option value="vi">Tiếng Việt (Vietnamese)</option>
            <option value="th">ไทย (Thai)</option>
            <option value="tl">Tagalog (Filipino)</option>
            <option value="ru">Русский (Russian)</option>
            <!-- 여기에 다른 많은 언어들이 추가될 수 있습니다 -->
        </select>
    </div>

    <div class="container">
        <h1 id="main-title">문화적응 여정</h1>
        
        <div class="avatar-box">
            <span class="emoji-opt selected" data-emoji="👨">👨</span>
            <span class="emoji-opt" data-emoji="👩">👩</span>
            <span class="emoji-opt" data-emoji="👨‍👩‍👧‍👦">👨‍👩‍👧‍👦</span>
        </div>

        <input type="text" id="member-name" placeholder="이름을 입력하세요">
        
        <div id="family-extra" class="hidden">
            <select id="gender-select">
                <option value="남성">남성 (Male)</option>
                <option value="여성">여성 (Female)</option>
            </select>
            <input type="text" id="role-input" placeholder="역할 (예: 아들/딸)">
        </div>

        <button id="add-btn">멤버 추가</button>
        <div id="member-list"></div>
        
        <button id="start-btn" class="hidden">여정 시작 (START)</button>

        <div id="survey-section" class="hidden">
            <div id="cards-container"></div>
            <button id="share-btn" style="width: 100%; background: #27ae60;">이야기 공유하기</button>
        </div>
    </div>

    <div class="container" style="margin-top: 30px; background: #fdfcf0;">
        <h2 id="feed-title">우리들의 이야기 💌</h2>
        <div id="feed-list"></div>

        <div id="admin-panel">
            <input type="password" id="admin-pw" placeholder="Password" style="width: 120px;">
            <button id="delete-all-btn" style="background: #e74c3c;">전체 삭제</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
