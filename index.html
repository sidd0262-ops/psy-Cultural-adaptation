<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maum Project: Journey</title>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        :root { --p-border: #333; --sky: #a2d2ff; }
        body { font-family: 'NeoDunggeunmo', monospace; margin: 0; background-color: var(--sky); overflow-x: hidden; color: #333; }
        
        /* 픽셀 배경 & 비행기 애니메이션 */
        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(180deg, #87ceeb 0%, #e0f7fa 100%); }
        .airplane { position: absolute; font-size: 3rem; top: 100px; left: -100px; animation: fly 25s linear infinite; z-index: -1; }
        @keyframes fly { from { left: -100px; transform: translateY(0); } 50% { transform: translateY(30px); } to { left: 110vw; transform: translateY(0); } }

        .container { max-width: 650px; margin: 40px auto; background: rgba(255, 255, 255, 0.95); border: 4px solid var(--p-border); padding: 30px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
        
        /* 언어 선택기 (250개 지원 대응) */
        .lang-header { text-align: right; margin-bottom: 15px; }
        #lang-select { font-family: inherit; border: 3px solid var(--p-border); padding: 5px; cursor: pointer; }

        /* 캐릭터 선택 */
        .char-grid { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .char-opt { width: 70px; height: 70px; border: 3px solid var(--p-border); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: #fff; cursor: pointer; transition: 0.2s; }
        .char-opt.selected { background: #ffeb3b; transform: scale(1.1); box-shadow: 0 5px 0 var(--p-border); }

        /* 징검다리 */
        .stones { display: flex; justify-content: space-between; margin: 35px 0; position: relative; }
        .stones::after { content: ''; position: absolute; top: 22px; left: 5%; right: 5%; height: 6px; background: #8d6e63; z-index: 1; border: 2px solid var(--p-border); }
        .stone { z-index: 2; width: 75px; height: 45px; background: #d7ccc8; border: 3px solid var(--p-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; box-shadow: 0 5px 0 #5d4037; }
        .stone.active { background: #4caf50; color: white; transform: translateY(-5px); box-shadow: 0 5px 0 #2e7d32; }

        /* 사지선다 */
        .quiz-card { text-align: left; margin-bottom: 25px; }
        .option-btn { display: block; width: 100%; text-align: left; margin: 8px 0; padding: 12px; border: 2px solid var(--p-border); background: #fff; cursor: pointer; font-family: inherit; }
        .option-btn.selected { background: #9c27b0; color: white; border-color: #4a148c; }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 25px; }
        .page-btn { padding: 6px 12px; border: 2px solid var(--p-border); background: #fff; cursor: pointer; font-family: inherit; }
        .page-btn.active { background: #333; color: white; }

        .hidden { display: none !important; }
        .post-card { border: 3px solid var(--p-border); padding: 20px; margin-bottom: 25px; background: #fff; position: relative; text-align: left; }
        .eraser { position: absolute; top: 10px; right: 10px; cursor: pointer; border: none; background: none; font-size: 1.5rem; }
        input, select { font-family: inherit; padding: 10px; border: 3px solid var(--p-border); margin: 10px 0; width: calc(100% - 26px); }
        button#add-btn, button#start-btn, button#share-btn { font-family: inherit; border: 3px solid var(--p-border); padding: 12px; cursor: pointer; box-shadow: 4px 4px 0 var(--p-border); width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sky-bg"><div class="airplane">✈️</div></div>

    <div class="lang-header">
        <select id="lang-select"></select>
    </div>

    <div class="container">
        <h1 id="ui-title">문화적응 여정</h1>
        <div class="char-grid">
            <div class="char-opt selected" data-char="🧑‍🌾">🧑‍🌾</div>
            <div class="char-opt" data-char="🧑‍🚀">🧑‍🚀</div>
            <div class="char-opt" data-char="🥷">🥷</div>
            <div class="char-opt" data-char="👨‍👩‍👧‍👦">👨‍👩‍👧‍👦</div>
        </div>

        <input type="text" id="user-name" placeholder="이름을 입력하세요">
        <div id="family-form" class="hidden">
            <select id="gender-sel"><option value="남성">남성</option><option value="여성">여성</option></select>
            <input type="text" id="role-in" placeholder="역할 (예: 첫째 아들)">
        </div>
        <button id="add-btn">멤버 추가</button>
        <div id="member-chips"></div>
        <button id="start-btn" class="hidden" style="background:#ff9800; color:white;">여정 시작 (START)</button>

        <div id="survey-area" class="hidden">
            <div id="member-cards"></div>
            <button id="share-btn" style="background:#4caf50; color:white;">이야기 공유하기</button>
        </div>
    </div>

    <div class="container" style="background:rgba(255,255,255,0.9);">
        <h2 id="ui-feed-title">우리들의 이야기 💌</h2>
        <div id="feed-list"></div>
        <div class="pagination" id="page-nav"></div>
        <div style="margin-top:40px; border-top:2px dashed #ccc; padding-top:20px;">
            <input type="password" id="admin-pw" placeholder="Admin PW" style="width:100px;">
            <button id="del-all" style="width:auto; background:#f44336; color:white; padding:10px;">전체 삭제</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
