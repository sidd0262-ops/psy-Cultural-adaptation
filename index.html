<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Adaptation Journey</title>
    <!-- 한글 픽셀 폰트 -->
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        :root { --main-bg: #f0f8ff; --pixel-border: #333; --accent: #ff99c8; }
        body { font-family: 'NeoDunggeunmo', monospace; background-color: var(--main-bg); color: #333; margin: 0; padding: 20px; line-height: 1.4; }
        h1 { text-align: center; color: #5e548e; text-shadow: 2px 2px #fff; font-size: 2rem; }
        
        /* 구글 스타일 언어 선택기 */
        .lang-selector { text-align: right; margin-bottom: 20px; }
        #lang-select { font-family: inherit; padding: 5px; border: 3px solid var(--pixel-border); background: #fff; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; background: #fff; border: 4px solid var(--pixel-border); padding: 20px; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        
        /* 아바타 & 입력창 */
        .avatar-row { display: flex; justify-content: center; gap: 15px; margin: 15px 0; font-size: 2rem; }
        .emoji-opt { cursor: pointer; filter: grayscale(1); transition: 0.2s; }
        .emoji-opt.selected { filter: grayscale(0); transform: scale(1.2); }
        input, select, textarea { width: calc(100% - 20px); font-family: inherit; border: 3px solid var(--pixel-border); padding: 8px; margin: 5px 0; }
        button { font-family: inherit; border: 3px solid var(--pixel-border); padding: 10px 20px; background: #be95c4; color: #fff; cursor: pointer; box-shadow: 4px 4px 0 #333; margin-top: 10px; }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #333; }

        /* 징검다리 디자인 */
        .stepping-stones { display: flex; justify-content: space-between; margin: 30px 0; position: relative; padding: 0 10px; }
        .stepping-stones::after { content: ''; position: absolute; top: 20px; left: 0; right: 0; height: 4px; background: #ddd; z-index: 1; }
        .stone { z-index: 2; width: 60px; height: 40px; background: #8d6e63; border: 3px solid var(--pixel-border); border-radius: 50%; 
                   cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; box-shadow: 0 4px 0 #5d4037; }
        .stone.active { background: #4caf50; box-shadow: 0 4px 0 #2e7d32; transform: translateY(-5px); }

        /* 말풍선 */
        .speech-bubble { background: #fff; border: 3px solid var(--pixel-border); padding: 15px; border-radius: 10px; margin-top: 10px; position: relative; min-height: 50px; }
        .speech-bubble::after { content: ''; position: absolute; top: -13px; left: 50%; transform: translateX(-50%); border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent var(--pixel-border) transparent; }

        /* 피드 & 삭제 아이콘 */
        .post-card { border: 3px solid var(--pixel-border); padding: 15px; margin-top: 20px; position: relative; background: #fdfcf0; }
        .eraser-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 1.2rem; border: none; background: none; }
        .hidden { display: none !important; }
        #admin-panel { margin-top: 30px; text-align: center; border-top: 2px dashed #ccc; padding-top: 20px; }
        .chip { display: inline-block; padding: 5px 10px; background: #e0e0e0; border: 2px solid #333; margin: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="lang-selector">
        <select id="lang-select">
            <option value="ko">한국어 (Korean)</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <div class="container">
        <h1 id="main-title">CULTURAL ADAPTATION</h1>
        
        <div class="avatar-row">
            <span class="emoji-opt selected" data-emoji="👨">👨</span>
            <span class="emoji-opt" data-emoji="👩">👩</span>
            <span class="emoji-opt" data-emoji="👨‍👩‍👧‍👦">👨‍👩‍👧‍👦</span>
        </div>

        <input type="text" id="member-name" placeholder="이름 (Name)">
        
        <div id="family-extra" class="hidden">
            <select id="gender-select">
                <option value="남성">남성 (Male)</option>
                <option value="여성">여성 (Female)</option>
            </select>
            <input type="text" id="role-input" placeholder="역할 (예: 첫째 딸)">
        </div>

        <button id="add-btn">Add Member</button>
        <div id="member-list"></div>
        
        <button id="start-btn" class="hidden">Start Journey</button>

        <div id="survey-section" class="hidden">
            <div id="cards-container"></div>
            <button id="share-btn" style="width: 100%; background: #4caf50;">Share Story</button>
        </div>
    </div>

    <div class="container" style="margin-top: 30px;">
        <h2 id="feed-title">Our Stories 💌</h2>
        <div id="feed-list"></div>

        <div id="admin-panel">
            <input type="password" id="admin-pw" placeholder="Password" style="width: 150px;">
            <button id="delete-all-btn" style="background: #e57373;">Delete All</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
