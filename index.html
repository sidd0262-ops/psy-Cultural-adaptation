<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문화적응 여정</title>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        :root { --p-border: #333; --sky: #a2d2ff; }
        body { font-family: 'NeoDunggeunmo', monospace; margin: 0; background-color: var(--sky); color: #333; overflow-x: hidden; }
        
        #google_translate_element { text-align: right; padding: 10px 20px; background: rgba(255,255,255,0.8); border-bottom: 3px solid var(--p-border); }
        .goog-te-gadget { font-family: 'NeoDunggeunmo', monospace !important; }

        .sky-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(180deg, #87ceeb 0%, #e0f7fa 100%); }
        .airplane { position: absolute; font-size: 3rem; top: 100px; left: -100px; animation: fly 25s linear infinite; z-index: -1; }
        @keyframes fly { from { left: -100px; transform: translateY(0); } 50% { transform: translateY(30px); } to { left: 110vw; transform: translateY(0); } }

        .container { max-width: 650px; margin: 30px auto; background: rgba(255, 255, 255, 0.95); border: 4px solid var(--p-border); padding: 30px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
        
        .char-grid { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .char-opt { width: 80px; height: 80px; border: 3px solid var(--p-border); background: #fff; cursor: pointer; transition: 0.2s; object-fit: cover; image-rendering: pixelated; }
        .char-opt.selected { background: #ffeb3b; transform: scale(1.15); box-shadow: 0 5px 0 var(--p-border); border-color: #e91e63; }

        .stones { display: flex; justify-content: space-between; margin: 35px 0; position: relative; }
        .stones::after { content: ''; position: absolute; top: 22px; left: 5%; right: 5%; height: 6px; background: #8d6e63; z-index: 1; border: 2px solid var(--p-border); }
        .stone { z-index: 2; width: 75px; height: 45px; background: #d7ccc8; border: 3px solid var(--p-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; box-shadow: 0 5px 0 #5d4037; }
        .stone.active { background: #4caf50; color: white; transform: translateY(-5px); box-shadow: 0 5px 0 #2e7d32; }

        .speech-bubble { background: #fdfcf0; border: 3px solid var(--p-border); padding: 15px; border-radius: 10px; margin: 15px 0; position: relative; line-height: 1.6; font-size: 0.95rem;}
        .speech-bubble::after { content: ''; position: absolute; top: -13px; left: 50%; transform: translateX(-50%); border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent var(--p-border) transparent; }

        .ans-box { width: calc(100% - 24px); height: 60px; font-family: inherit; padding: 10px; border: 3px solid var(--p-border); margin-bottom: 5px; resize: none; font-size: 1rem; }
        input, select { font-family: inherit; padding: 10px; border: 3px solid var(--p-border); margin: 10px 0; width: calc(100% - 26px); font-size: 1rem; }
        button { font-family: inherit; border: 3px solid var(--p-border); padding: 12px; cursor: pointer; box-shadow: 4px 4px 0 var(--p-border); width: 100%; font-size: 1.1rem; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .page-btn { padding: 8px 15px; border: 2px solid var(--p-border); background: #fff; cursor: pointer; width: auto; box-shadow: 2px 2px 0 var(--p-border); font-size: 1rem; }
        .page-btn.active { background: #9c27b0; color: white; }

        .hidden { display: none !important; }
        .post-card { border: 3px solid var(--p-border); padding: 25px; margin-bottom: 25px; background: #fff; text-align: left; }
        
        /* 지우개 겹침 완전 방지 스타일 */
        .eraser { cursor: pointer; border: none; background: none; font-size: 1.5rem; width: auto; box-shadow: none; padding: 0; margin-left: 15px; }
        .qa-item { background: #f9f9f9; padding: 12px; border-left: 5px solid #ff9800; border-radius: 4px; margin-top: 10px; }
        .q-text { display: block; font-weight: bold; color: #444; margin-bottom: 5px; font-size: 0.9rem; }
        .a-text { display: block; color: #111; font-size: 1rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'ko,vi,zh-CN,zh-TW,th,tl,ru,mn,km,ne,id,uz,en,ja', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <div class="sky-bg"><div class="airplane">✈️</div></div>

    <div class="container">
        <h1 style="text-align: center; color: #4a148c; text-shadow: 2px 2px #fff;">문화적응 여정</h1>
        
        <div class="char-grid">
            <img src="pixel_man.png" alt="남자" class="char-opt selected" data-char="남자">
            <img src="pixel_woman.png" alt="여자" class="char-opt" data-char="여자">
            <img src="pixel_family.png" alt="가족" class="char-opt" data-char="가족">
        </div>

        <input type="text" id="user-name" placeholder="이름을 입력하세요">
        <div id="family-form" class="hidden">
            <select id="gender-sel">
                <option value="남성">남성</option>
                <option value="여성">여성</option>
            </select>
            <input type="text" id="role-in" placeholder="가족 내 역할 (예: 첫째 딸)">
        </div>
        <button id="add-btn" style="background: #e0e0e0;">멤버 추가</button>
        <div id="member-chips" style="margin-top: 15px;"></div>
        <button id="start-btn" class="hidden" style="background:#ff9800; color:white; margin-top: 15px;">여정 시작 (START)</button>

        <div id="survey-area" class="hidden">
            <div id="member-cards"></div>
            <button id="share-btn" style="background:#4caf50; color:white; margin-top: 20px;">우리들의 이야기 공유하기</button>
        </div>
    </div>

    <div class="container" style="background:rgba(255,255,255,0.95);">
        <h2 id="feed-title" style="text-align: center;">우리들의 이야기 💌</h2>
        <div id="feed-list"></div>
        <div class="pagination" id="page-nav"></div>
        
        <!-- 보안 관리자 패널 -->
        <div style="margin-top:40px; border-top:2px dashed #ccc; padding-top:20px; text-align: center;">
            <input type="password" id="admin-pw" placeholder="비밀번호" style="width:120px; display: inline-block;">
            <button id="del-all" style="width:auto; background:#f44336; color:white; padding:10px; display: inline-block;">전체 삭제</button>
        </div>
    </div>

    <audio id="bgm-player" src="bgm.mp3" loop></audio>
    <button id="bgm-btn" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; border: 3px solid var(--p-border); background: #fff; font-size: 1.5rem; cursor: pointer; padding: 10px 15px; border-radius: 50%; box-shadow: 4px 4px 0 #333; width: auto;">🔇</button>

    <script type="module" src="app.js"></script>
</body>
</html>
