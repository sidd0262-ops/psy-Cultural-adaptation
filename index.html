<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepping Stones - Our Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 상단: 온보딩 및 아바타 생성 -->
        <section id="setup-section" class="card">
            <h1 id="title-text">Welcome! 🌍</h1>
            <p id="sub-text">Select language and add your family members.</p>
            
            <select id="lang-select">
                <option value="ko">한국어 (Korean)</option>
                <option value="en" selected>English</option>
                <option value="vi">Tiếng Việt</option>
            </select>

            <div class="member-creator">
                <input type="text" id="new-name" placeholder="Name/Nickname">
                <div class="emoji-list" id="emoji-list">
                    <span class="emoji-opt selected" data-emoji="👨🏽">👨🏽</span>
                    <span class="emoji-opt" data-emoji="👩🏼">👩🏼</span>
                    <span class="emoji-opt" data-emoji="🧒🏿">🧒🏿</span>
                    <span class="emoji-opt" data-emoji="👨🏻‍👩🏼‍👧🏻‍👦🏾">👨‍👩‍👧‍👦</span>
                    <span class="emoji-opt" data-emoji="👩🏻‍🤝‍👨🏼">👩🏻‍🤝‍👨🏼</span>
                </div>
                <button id="add-member-btn" class="secondary-btn">+ Add Member</button>
            </div>
            <div id="member-chips" class="chips-container"></div>
            <button id="start-btn" class="primary-btn hidden">Start My Journey</button>
        </section>

        <!-- 중단: 동적 스펙트럼 & 질문 (시작 시 등장) -->
        <section id="question-section" class="hidden">
            <div id="dynamic-cards"></div>
            <button id="share-btn" class="primary-btn">Share Together</button>
        </section>

        <!-- 하단: 커뮤니티 게시판 (항상 노출) -->
        <section id="feed-section" class="card">
            <div class="feed-header">
                <h2>Our Stories 💌</h2>
                <button id="admin-lock" class="admin-btn"><i class="fas fa-lock"></i></button>
            </div>
            <div id="feed-container"></div>
        </section>
    </div>

    <!-- 관리자 비밀번호 모달 -->
    <div id="admin-modal" class="modal hidden">
        <div class="modal-box">
            <h3>Admin Management</h3>
            <input type="password" id="admin-pw" placeholder="Password (0530)">
            <div class="admin-btns">
                <button id="del-all-btn" class="danger-btn">Delete All</button>
                <button id="close-admin">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
